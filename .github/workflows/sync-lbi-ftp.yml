name: Sync LBI zip from FTP to R2

on:
  schedule:
    - cron: '30 * * * *'  # Every hour at :30 (before the :00 cron-sync)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download zip from FTP
        run: |
          curl -s "ftp://${{ secrets.LBI_FTP_HOST }}/${{ secrets.LBI_FTP_FILE }}" \
            --user "${{ secrets.LBI_FTP_USER }}:${{ secrets.LBI_FTP_PASS }}" \
            -o /tmp/lbi_import.zip
          ls -lh /tmp/lbi_import.zip

      - name: Upload to R2
        run: npx wrangler r2 object put pujol-photos/lbi/import.zip --file=/tmp/lbi_import.zip --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
